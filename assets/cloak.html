        .sidebar {

            overflow-x: hidden;

        }

            padding: 10px 15px;

            font-size: 18px;

        }

        }

        .main {
            margin-left: 0px;
            /* Same as sidebar width */
            padding: 0px;
            transition: margin-left 0.3s ease;
        }

        /* Closed sidebar */
        .sidebar.closed {
            width: 0;
            padding-top: 0px;
        }

        .main.closed {
            margin-left: 0;
        }

            top: 15px;
