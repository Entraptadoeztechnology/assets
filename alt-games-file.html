<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoGuardian Nexus Plus</title>

    <link rel="icon" type="image/jpeg" href="https://cdn.prod.website-files.com/60db82d1be38ad3341c2ff23/60e88f2f7edf9c151eda4d05_goguardian-shield-32.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #07050a;
            --sidebar: rgba(12, 10, 18, 0.95);
            --accent: #a855f7;
            --accent-dark: #4c1d95;
            --text-main: #f5f3ff;
            --text-muted: #94a3b8;
            --border: #3b0764;
            --sidebar-width: 68px;
            --panel-width: 340px;
            --panel-bg: rgba(15, 12, 25, 0.98);
            --glow: 0 0 20px rgba(168, 85, 247, 0.6);
            --danger: #ef4444;
        }

        /* --- FANCY MODE (OVER THE TOP) --- */
        body:not(.smooth-mode):not(.perf-mode) {
            background: linear-gradient(-45deg, #07050a, #1e1b4b, #0f172a, #2e1065);
            background-size: 400% 400%;
            animation: backgroundMove 15s ease infinite;
        }
        body:not(.smooth-mode):not(.perf-mode) .btn-flashy,
        body:not(.smooth-mode):not(.perf-mode) .btn-action,
        body:not(.smooth-mode):not(.perf-mode) .nav-item,
        body:not(.smooth-mode):not(.perf-mode) .asset-card {
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.4);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        body:not(.smooth-mode):not(.perf-mode) .btn-flashy:hover,
        body:not(.smooth-mode):not(.perf-mode) .btn-action:hover,
        body:not(.smooth-mode):not(.perf-mode) .nav-item:hover {
            transform: scale(1.15) translateY(-8px);
            box-shadow: 0 0 50px var(--accent), 0 0 20px #fff;
            filter: brightness(1.4);
            border-color: #fff !important;
        }
        body:not(.smooth-mode):not(.perf-mode) .hub-box {
            animation: float 5s ease-in-out infinite;
            box-shadow: 0 0 60px rgba(168, 85, 247, 0.4);
            border: 2px solid var(--accent);
        }

        /* --- PERFORMANCE MODE (ABSOLUTE ZERO) --- */
        body.perf-mode { background: #000 !important; animation: none !important; }
        body.perf-mode * { 
            backdrop-filter: none !important; 
            box-shadow: none !important; 
            transition: none !important; 
            animation: none !important; 
            text-shadow: none !important;
            transform: none !important;
            filter: none !important;
            border-radius: 0px !important;
        }
        body.perf-mode .btn-flashy { border: 1px solid #555 !important; background: #111 !important; }

        /* --- SMOOTH MODE (MIDDLE) --- */
        body.smooth-mode { animation: none !important; }
        body.smooth-mode * { backdrop-filter: none !important; box-shadow: none !important; transition: 0.2s ease; }
        body.smooth-mode .btn-flashy { animation: none !important; }

        @keyframes backgroundMove { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-20px); } 100% { transform: translateY(0px); } }
        @keyframes neonPulse {
            0% { box-shadow: 0 0 5px var(--accent); border-color: var(--accent); }
            50% { box-shadow: 0 0 35px var(--accent); border-color: #fff; }
            100% { box-shadow: 0 0 5px var(--accent); border-color: var(--accent); }
        }

        body { font-family: 'Inter', sans-serif; margin: 0; color: var(--text-main); display: flex; height: 100vh; width: 100vw; overflow: hidden; }
        .sidebar { width: var(--sidebar-width); background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 20px 0; gap: 12px; z-index: 100; }
        .nav-item { width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; border-radius: 12px; cursor: pointer; color: var(--text-muted); }
        .nav-item.active { background: rgba(168, 85, 247, 0.2); color: var(--accent); border: 1px solid var(--accent); }
        .main-wrapper { flex: 1; display: flex; flex-direction: column; }
        header { height: 60px; background: rgba(7, 5, 10, 0.8); display: flex; justify-content: space-between; align-items: center; padding: 0 25px; border-bottom: 1px solid var(--border); }
        #content-area { flex: 1; display: flex; position: relative; overflow: hidden; }
        #hub-view { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; overflow-y: auto; }
        #workspace-view, #ugs-view, #ghost-view { display: none; width: 100%; height: 100%; }
        .hub-box { background: var(--panel-bg); border: 1px solid var(--border); padding: 50px; border-radius: 25px; width: 100%; max-width: 580px; text-align: center; margin-bottom: 30px; }
        .btn-flashy { background: #100a1c; color: white; border: 2px solid var(--accent); padding: 16px 40px; border-radius: 10px; font-weight: 800; text-transform: uppercase; cursor: pointer; animation: neonPulse 2s infinite ease-in-out; }
        .list-side { width: var(--panel-width); background: var(--panel-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .editor-side { width: var(--panel-width); background: var(--panel-bg); padding: 20px; display: flex; flex-direction: column; gap: 15px; border-right: 1px solid var(--border); }
        .display-side { flex: 1; background: #000; }
        iframe { width: 100%; height: 100%; border: none; background: #000; }
        .asset-card { background: rgba(168, 85, 247, 0.05); margin: 0 15px 10px 15px; padding: 12px; border-radius: 10px; border: 1px solid var(--border); cursor: pointer; display: flex; align-items: center; }
        .del-x { color: #555; margin-left: auto; font-weight: bold; cursor: pointer; padding: 4px; }
        input, textarea { background: rgba(0,0,0,0.5); color: #fff; border: 1px solid var(--border); padding: 12px; border-radius: 8px; font-size: 0.85rem; outline: none; }
        textarea { flex: 1; font-family: 'Fira Code', monospace; resize: none; }
        .btn-action { background: #1e1b4b; color: #fff; border: 1px solid var(--border); padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 0.75rem; }
        .btn-run { background: var(--accent-dark) !important; border: 1px solid var(--accent) !important; }
        .port-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; border-top: 1px solid var(--border); }
    </style>
</head>
<body id="main-body">

<nav class="sidebar">
    <div class="nav-item active" id="btn-hub" onclick="showPage('hub')"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg></div>
    <div class="nav-item" id="btn-work" onclick="showPage('work')"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path></svg></div>
    <div class="nav-item" id="btn-ugs" onclick="showPage('ugs')"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line></svg></div>
    <div class="nav-item" id="btn-ghost" onclick="showPage('ghost')"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg></div>
    <div class="nav-item" id="perf-btn" onclick="togglePerf()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"></path></svg></div>
    <div class="nav-item" onclick="goFull()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3"></path></svg></div>
</nav>

<div class="main-wrapper">
    <header>
        <span style="font-weight: 900; font-size: 0.75rem; letter-spacing: 2px;">NEXUS PLUS</span>
        <span id="status" style="font-size: 0.6rem; color: var(--text-muted);">READY</span>
    </header>

    <div id="content-area">
        <div id="hub-view">
            <div class="hub-box">
                <h1 style="margin:0 0 20px 0; font-size: 2.8rem; font-weight: 800;">Nexus Hub</h1>
                <div style="display: flex; gap: 15px; justify-content: center; flex-wrap: wrap;">
                    <button class="btn-flashy" onclick="showPage('work')">Workspace</button>
                    <button class="btn-flashy" style="border-color: #3b82f6 !important;" onclick="showPage('ugs')">UGS Files</button>
                    <button class="btn-flashy" style="border-color: #22c55e !important;" onclick="showPage('ghost')">GhostLink</button>
                </div>
            </div>
        </div>

        <div id="workspace-view">
            <div class="list-side">
                <div style="padding:20px;"><input type="text" id="search-bar" style="width:100%; box-sizing:border-box;" placeholder="Search your list..." oninput="drawList()"></div>
                <div id="asset-list" style="flex:1; overflow-y:auto;"></div>
                <div class="port-controls">
                    <button class="btn-action" onclick="exportData()">EXPORT</button>
                    <button class="btn-action" onclick="document.getElementById('import-file').click()">IMPORT</button>
                    <input type="file" id="import-file" style="display:none" onchange="importData(this)">
                </div>
            </div>
            <div class="editor-side">
                <button class="btn-action" onclick="showPage('hub')">← BACK TO HUB</button>
                <input type="text" id="input-name" placeholder="Item Name">
                <textarea id="input-code" placeholder="Paste Link or HTML Code"></textarea>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <button class="btn-action btn-run" onclick="saveAndRun()">RUN & SAVE</button>
                    <button class="btn-action" style="background:#300;" onclick="clearInput()">CLEAR</button>
                </div>
            </div>
            <div class="display-side"><iframe id="main-frame" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe></div>
        </div>

        <div id="ugs-view"><iframe id="ugs-frame" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe></div>
        <div id="ghost-view"><iframe id="ghost-frame" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe></div>
    </div>
</div>

<script>
    let vault = JSON.parse(localStorage.getItem('nexusVault')) || {};
    let perf = 0;

    // RESTORED UGS FORMAT: Search bar + One Row vertical list
    const ugsCode = `<!DOCTYPE html><html><head><style>
        body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #2e3244 0%, #36224b 100%); min-height: 100vh; margin: 0; padding: 20px; color: white; display: flex; flex-direction: column; align-items: center; }
        .sidebar { position: fixed; left: 0; top: 0; width: 80px; height: 100vh; background: rgba(0, 0, 0, 0.3); backdrop-filter: blur(10px); padding: 20px 10px; display: flex; flex-direction: column; gap: 8px; overflow-y: auto; z-index: 1000; }
        .sidebar-btn { background: rgb(89, 134, 218); border: none; padding: 12px; font-size: 18px; font-weight: 700; border-radius: 8px; cursor: pointer; color: white; transition: 0.2s; }
        input[type="text"] { padding: 13px; width: 100%; max-width: 600px; border-radius: 8px; border: none; margin: 10px; box-sizing: border-box; }
        input[type="button"] { background: rgb(89, 134, 218); border: none; padding: 15px 30px; font-size: 16px; border-radius: 8px; cursor: pointer; width: 100%; max-width: 600px; color: white; text-align: left; margin-bottom: 10px; transition: 0.3s; }
        input[type="button"]:hover { transform: translateY(-2px); background: #79aadb; }
        #sections-container { width: 100%; max-width: 600px; display: flex; flex-direction: column; }
        a { color: #79aadb; text-decoration: none; }
    </style></head><body><div class="sidebar" id="sidebar"></div><h1>UGS Files</h1><p>Files from <a href="https://docs.google.com/document/d/1_FmH3BlSBQI7FGgAQL59-ZPe8eCxs35wel6JUyVaG8Q/" target="_blank">Ultimate Game Stash</a></p>
    <input type="text" placeholder="Search..." id="searchInput">
    <div id="sections-container"></div>
    <script src="https://cdn.jsdelivr.net/gh/bubbls/ugs-singlefile@main/game.js"><\/script>
    <script src="https://cdn.jsdelivr.net/gh/bubbls/ugs-singlefile@main/searchbut.js"><\/script>
    </body></html>`;

    function showPage(p) {
        document.getElementById('hub-view').style.display = (p === 'hub') ? 'flex' : 'none';
        document.getElementById('workspace-view').style.display = (p === 'work') ? 'flex' : 'none';
        document.getElementById('ugs-view').style.display = (p === 'ugs') ? 'block' : 'none';
        document.getElementById('ghost-view').style.display = (p === 'ghost') ? 'block' : 'none';
        
        const btns = ['btn-hub', 'btn-work', 'btn-ugs', 'btn-ghost'];
        btns.forEach(b => { if(document.getElementById(b)) document.getElementById(b).classList.remove('active'); });
        if(document.getElementById('btn-' + p)) document.getElementById('btn-' + p).classList.add('active');

        if (p === 'ugs') {
            const f = document.getElementById('ugs-frame');
            if (!f.srcdoc) f.srcdoc = ugsCode;
        } else if (p === 'ghost') {
            loadGhostLink();
        } else if (p === 'work') {
            drawList();
        }
    }

    async function loadGhostLink() {
        const frame = document.getElementById('ghost-frame');
        if (frame.srcdoc) return;
        const response = await fetch("https://cdn.jsdelivr.net/gh/virtuan4-max/ghostlinkhub@latest/ghostlinksinglefile.html?v=" + Date.now());
        const html = await response.text();
        frame.srcdoc = html;
    }

    function saveAndRun() {
        let n = document.getElementById('input-name').value.trim() || "Item_" + Date.now();
        let c = document.getElementById('input-code').value.trim();
        const f = document.getElementById('main-frame');
        if (!c) return;
        vault[n] = c;
        localStorage.setItem('nexusVault', JSON.stringify(vault));
        drawList();
        if (c.startsWith('http')) { f.removeAttribute('srcdoc'); f.src = c; }
        else { f.removeAttribute('src'); f.srcdoc = `<html><body style="margin:0; background:#000;">${c}</body></html>`; }
    }

    function drawList() {
        const list = document.getElementById('asset-list');
        const q = document.getElementById('search-bar').value.toLowerCase();
        list.innerHTML = '';
        Object.keys(vault).filter(x => x.toLowerCase().includes(q)).sort().forEach(x => {
            const d = document.createElement('div');
            d.className = 'asset-card';
            d.innerHTML = `<span>${x}</span><span class="del-x" onclick="event.stopPropagation(); delItem('${x}')">×</span>`;
            d.onclick = () => { document.getElementById('input-name').value = x; document.getElementById('input-code').value = vault[x]; saveAndRun(); };
            list.appendChild(d);
        });
    }

    function delItem(x) { if(confirm('Delete?')) { delete vault[x]; localStorage.setItem('nexusVault', JSON.stringify(vault)); drawList(); } }
    function clearInput() { document.getElementById('input-name').value = ''; document.getElementById('input-code').value = ''; }
    
    function exportData() {
        const blob = new Blob([JSON.stringify(vault)], {type: 'application/json'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob); a.download = `nexus_backup.json`; a.click();
    }

    function importData(input) {
        const reader = new FileReader();
        reader.onload = (e) => {
            vault = {...vault, ...JSON.parse(e.target.result)};
            localStorage.setItem('nexusVault', JSON.stringify(vault));
            drawList();
        };
        reader.readAsText(input.files[0]);
    }

    function togglePerf() {
        perf = (perf + 1) % 3;
        const b = document.getElementById('main-body');
        const i = document.getElementById('perf-btn');
        const s = document.getElementById('status');
        b.classList.remove('smooth-mode', 'perf-mode');
        
        if (perf === 0) {
            i.style.color = "";
            s.textContent = "MODE: FANCY";
        } else if (perf === 1) {
            b.classList.add('smooth-mode');
            i.style.color = "#22c55e";
            s.textContent = "MODE: SMOOTH";
        } else {
            b.classList.add('perf-mode');
            i.style.color = "#f00";
            s.textContent = "MODE: PERFORMANCE";
        }
    }

    function goFull() {
        let f = document.getElementById('main-frame');
        if (document.getElementById('ugs-view').style.display === 'block') f = document.getElementById('ugs-frame');
        if (document.getElementById('ghost-view').style.display === 'block') f = document.getElementById('ghost-frame');
        if (f.requestFullscreen) f.requestFullscreen();
    }

    window.onload = () => drawList();
</script>
</body>
</html>
