<!DOCTYPE html>
<html>
<head>
  <!--try using something like CDNs to encode your JS scripts!-->
    <title>Clever | Portal</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #2e3244 0%, #36224b 100%);
            min-height: 100vh;
            margin: 0;
            padding: 0;
            display: flex;
        }

        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 80px;
            height: 100vh;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            padding: 20px 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            overflow-y: auto;
            box-shadow: 2px 0 10px rgba(0,0,0,0.3);
            z-index: 1000;
        }

        .sidebar::-webkit-scrollbar {
            width: 6px;
        }

        .sidebar::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.1);
        }

        .sidebar::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.3);
            border-radius: 3px;
        }

        .sidebar-btn {
            background: rgb(89, 134, 218);
            border: none;
            padding: 12px;
            font-size: 18px;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: white;
            text-align: center;
            min-height: 45px;
        }

        .sidebar-btn:hover {
            background: #79aadb;
            transform: scale(1.05);
        }

        .sidebar-btn.empty {
            opacity: 0.4;
            cursor: default;
        }

        .sidebar-btn.empty:hover {
            transform: none;
            background: rgb(89, 134, 218);
        }

        .main-content {
            margin-left: 100px;
            flex: 1;
            padding: 20px;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 5px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .sub-title {
            color: rgba(255, 255, 255, 0.7);
            text-align: center;
            font-size: 22px;
            margin-top: 0;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.3);
        }

        /* Interactive Widgets Layout */
        .hub-controls {
            max-width: 900px;
            margin: 0 auto 30px auto;
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .search-box {
            flex-grow: 1;
            padding: 15px;
            background: rgba(20, 20, 30, 0.6);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
            font-size: 1.1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-box:focus {
            border-color: #79aadb;
        }

        .form-btn {
            background: #ff007f;
            color: white;
            text-decoration: none;
            padding: 15px 25px;
            font-weight: bold;
            border-radius: 8px;
            text-transform: uppercase;
            font-size: 0.9rem;
            white-space: nowrap;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: background 0.2s, transform 0.2s;
        }

        .form-btn:hover {
            background: #ff0055;
            transform: translateY(-2px);
        }

        .letter-section {
            margin-bottom: 40px;
            padding: 0 20px;
            max-width: 900px;
            margin-left: auto;
            margin-right: auto;
            min-height: 100px;
        }

        .letter-header {
            color: white;
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 3px solid rgba(255,255,255,0.3);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            text-transform: uppercase;
        }

        .favorite-section .letter-header { color: #00ffcc; border-bottom-color: rgba(0, 255, 204, 0.4); }
        .recent-section .letter-header { color: #ffcc00; border-bottom-color: rgba(255, 204, 0, 0.4); }

        .buttons-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
        }

        .empty-message {
            color: rgba(255,255,255,0.4);
            font-style: italic;
            text-align: center;
            padding: 20px;
            width: 100%;
        }

        .game-row {
            background: rgb(89, 134, 218);
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            width: 100%;
            max-width: 600px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            overflow: hidden;
        }

        .game-row:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.2);
            background: #79aadb;
        }

        .game-btn {
            background: none;
            border: none;
            padding: 15px 20px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            color: white;
            text-align: left;
            flex-grow: 1;
            text-transform: uppercase;
        }

        .star-btn {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.3);
            font-size: 1.5rem;
            padding: 0 20px;
            cursor: pointer;
            transition: color 0.2s, transform 0.2s;
            height: 100%;
        }

        .star-btn:hover {
            transform: scale(1.2);
        }

        .star-btn.fav-active {
            color: #ffcc00;
        }

        #lolbutton {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #79aadb;
            padding: 4px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            margin-left: 10px;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 60px;
                padding: 15px 5px;
            }
            .sidebar-btn {
                padding: 8px;
                font-size: 16px;
            }
            .main-content {
                margin-left: 70px;
            }
            .hub-controls {
                flex-direction: column;
                align-items: stretch;
            }
        }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar"></div>

    <div class="main-content">
        <h1>UGS Files</h1>
        <div class="sub-title">Emulator Games</div>

        <h2 style="color: white; text-align: center; margin-bottom: 15px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); font-weight: normal; font-size: 16px;">
            Files from 
            <a href="https://docs.google.com/document/d/1_FmH3BlSBQI7FGgAQL59-ZPe8eCxs35wel6JUyVaG8Q/" target="_blank" style="display: inline; color: #79aadb; text-decoration: none;">
                Ultimate Game Stash Google Doc
            </a>
        </h2>
        <h2 style="color: white; text-align: center; margin-bottom: 30px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); font-weight: normal; font-size: 16px;">
            Discord Server:
            <a href="https://discord.gg/rmVsAqkpkA" target="_blank" style="display: inline; color: #79aadb; text-decoration: none;">
                https://discord.gg/rmVsAqkpkA
            </a>
            <button id="lolbutton" onclick="const script = document.createElement('script');script.src = 'https://cdn.jsdelivr.net/gh/bubbls/ugs-singlefile@main/games.js';document.body.appendChild(script);">Click to load if it isn't loading</button>
        </h2>

        <div class="hub-controls">
            <input type="text" id="search-input" class="search-box" placeholder="Search emulator games..." onkeyup="filterGames()">
            <a href="https://docs.google.com/forms/d/e/1FAIpQLScT1NUDW1NTlzeOpvuIF3sQ-LwqHe4jnPezWBddk2wDXyo0eA/viewform?usp=preview" target="_blank" class="form-btn">Request / Upload File</a>
        </div>

        <div id="user-sections-container">
            <div class="letter-section favorite-section">
                <div class="letter-header">My Favorites</div>
                <div class="buttons-container" id="favorites-list"></div>
            </div>

            <div class="letter-section recent-section">
                <div class="letter-header">Recently Played</div>
                <div class="buttons-container" id="recent-list"></div>
            </div>
        </div>

        <div id="sections-container"></div>
    </div>
    <script src="https://raw.githack.com/entraptadoeztech/The_Unity_Proxy_Project/refs/heads/main/Upgraded-UGS-script.js"></script>
   <script src="https://cdn.jsdelivr.net/gh/bubbls/ugs-singlefile@main/games.js"></script>
</body>
</html>
